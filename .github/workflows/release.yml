name: Release

# Releasing is tag-driven: push a tag, and this workflow verifies the platform it belongs to and
# publishes the GitHub Release with the matching CHANGELOG section. Nothing is done by hand.
#
#   0.51.0          → iOS  (Swift Package Manager resolves it straight from the tag)
#   android-0.9.0   → Android (JitPack builds the artifacts from the same tag)
#
# See RELEASING.md for the procedure.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'android-[0-9]+.[0-9]+.[0-9]+'

jobs:
  ios:
    if: ${{ !startsWith(github.ref_name, 'android-') }}
    name: iOS release
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # A tag must never ship code that doesn't build: verification gates the release.
      - name: macOS test
        run: swift test

      - name: iOS build
        run: |
          xcodebuild -scheme Olaf \
            -destination 'generic/platform=iOS' \
            build CODE_SIGNING_ALLOWED=NO

      - name: Extract the CHANGELOG section
        id: notes
        run: |
          python3 scripts/changelog_section.py CHANGELOG.md "${GITHUB_REF_NAME}" > release-notes.md
          cat release-notes.md

      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "iOS ${GITHUB_REF_NAME}" \
            --latest \
            --notes-file release-notes.md

  android:
    if: ${{ startsWith(github.ref_name, 'android-') }}
    name: Android release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: Android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew :olaf:testDebugUnitTest

      # The sample compiles against :olaf in debug and :olaf-no-op in release, so this is also the
      # API-compatibility gate between the two artifacts.
      - name: Build artifacts + API compatibility
        run: |
          ./gradlew -Pversion="${GITHUB_REF_NAME}" \
            :olaf:assembleRelease :olaf-no-op:assembleRelease \
            :sample:assembleDebug :sample:assembleRelease

      - name: Extract the CHANGELOG section
        id: notes
        run: |
          python3 ../scripts/changelog_section.py CHANGELOG.md "${GITHUB_REF_NAME}" > release-notes.md
          cat release-notes.md

      - name: Publish the GitHub Release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Not marked latest: the repository's front page belongs to the Swift package, and an
          # Android tag showing up as "Latest" there misleads iOS consumers. The Android release
          # line is found through Android/README.md and its own badge.
          gh release create "${GITHUB_REF_NAME}" \
            --title "Android ${GITHUB_REF_NAME#android-}" \
            --latest=false \
            --notes-file Android/release-notes.md \
            Android/olaf/build/outputs/aar/olaf-release.aar \
            Android/olaf-no-op/build/outputs/aar/olaf-no-op-release.aar
