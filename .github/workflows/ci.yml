name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: macOS test + iOS build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: macOS build & test
        run: swift test

      # Since viewer content is UIKit-gated, the iOS build is verified separately
      # (CLAUDE.md rule: macOS test + iOS build must both be green on every change).
      - name: iOS build
        run: |
          xcodebuild -scheme Olaf \
            -destination 'generic/platform=iOS' \
            build CODE_SIGNING_ALLOWED=NO
