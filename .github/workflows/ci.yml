name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ios:
    name: macOS test + iOS build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: macOS build & test
        run: swift test

      # Since viewer content is UIKit-gated, the iOS build is verified separately
      # (CLAUDE.md rule: macOS test + iOS build must both be green on every change).
      - name: iOS build
        run: |
          xcodebuild -scheme Olaf \
            -destination 'generic/platform=iOS' \
            build CODE_SIGNING_ALLOWED=NO

  android:
    name: Android unit tests + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      # Same bar as iOS: unit tests and both publishable artifacts must build clean
      # (the build is configured with allWarningsAsErrors).
      - name: Unit tests
        run: ./gradlew :olaf:testDebugUnitTest

      - name: Build library + no-op
        run: ./gradlew :olaf:assembleRelease :olaf-no-op:assembleRelease

      # The sample compiles against :olaf in debug and :olaf-no-op in release, so this fails the
      # moment a public signature drifts between the two artifacts.
      - name: API compatibility (sample against both artifacts)
        run: ./gradlew :sample:assembleDebug :sample:assembleRelease
